<head>

body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-family: Arial; margin: 0; padding: 20px; text-align: center; }

button { background: #f59e0b; color: black; border: none; padding: 20px; border-radius: 10px; font-weight: bold; margin-top: 10px; width: 100%; font-size: 20px; }

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

  alert("Step 1: SDK Loaded")
  Pi.init({ version: "2.0", sandbox: true })

<body>
<h1>👑 TEST LANG MUNA</h1>
<button onclick="loginPi()">TEST LOGIN WITH PI</button>

<script>
function loginPi() {
  alert("Step 3: Button Clicked")
  Pi.authenticate(['username', 'payments'], function(auth) {
    alert("SUCCESS! Welcome " + auth.user.username + "!")

    alert("ERROR: " + error)
  })
}
