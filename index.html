<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alberto NFT Marketplace</title>
<style>
body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-family: Arial; margin: 0; padding: 20px; }
h1 { text-align: center; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
.nft-card { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 10px; text-align: center; }
.nft-card img { width: 100%; border-radius: 10px; }
button { background: #f59e0b; color: black; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; margin-top: 10px; width: 100%; }
</style>
</head>
<body>
<h1>👑 Alberto NFT Marketplace</h1>
<button>Login with Pi</button>
<div class="grid">
<div class="nft-card"><img src="https://picsum.photos/200/200?1"><p>NFT #1</p><button>Buy Now</button></div>
<div class="nft-card"><img src="https://picsum.photos/200/200?2"><p>NFT #2</p><button>Buy Now</button></div>
<div class="nft-card"><img src="https://picsum.photos/200/200?3"><p>NFT #3</p><button>Buy Now</button></div>
<div class="nft-card"><img src="https://picsum.photos/200/200?4"><p>NFT #4</p><button>Buy Now</button></div>
<div class="nft-card"><img src="https://picsum.photos/200/200?5"><p>NFT #5</p><button>Buy Now</button></div>
<div class="nft-card"><img src="https://picsum.photos/200/200?6"><p>NFT #6</p><button>Buy Now</button></div>
</div>
</body>
</html>
